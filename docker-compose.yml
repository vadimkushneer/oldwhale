# Full local stack: SQLite-backed NestJS API + Vite frontend (dev server in Docker).
# From repo root: ./start-latest-local.sh   or   ./dev-stack.sh
#
# URLs:  API http://localhost:${API_HOST_PORT:-18080}   Frontend http://localhost:5173
# Backend SQLite data: named volume fullstack_backend_data (not removed by up --build; use down -v to wipe)

services:
  api:
    build:
      context: ./oldwhale-backend
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-18080}:8080"
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-me-to-32-chars-min!!}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,https://localhost,capacitor://localhost}
      PORT: ${PORT:-8080}
      SQLITE_PATH: /app/data/oldwhale.sqlite
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    volumes:
      - fullstack_backend_data:/app/data

  web:
    build:
      context: ./oldwhale-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:${API_HOST_PORT:-18080}
      DOCKER: "1"
    volumes:
      - ./oldwhale-frontend:/app
      - fullstack_web_node_modules:/app/node_modules
    # Bind-mount replaces image /app; named volume holds deps. See oldwhale-frontend/docker-entrypoint.sh.
    command: ["sh", "./docker-entrypoint.sh"]
    depends_on:
      - api

volumes:
  fullstack_backend_data:
  fullstack_web_node_modules:
